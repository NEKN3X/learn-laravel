services:
  composer:
    image: composer:2
    working_dir: /var/www/html/apps/timeline-cli
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      COMPOSER_HOME: /tmp/composer
      TZ: Asia/Tokyo
    volumes:
      - .:/var/www/html

  php:
    image: php:8.5-cli
    working_dir: /var/www/html
    environment:
      TZ: Asia/Tokyo
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    command: php -S 0.0.0.0:8000 -t public
